; PlatformIO Project Configuration File
;
; Firmware de testes da IHM para ESP32 DEVKIT V1 / ESP32-WROOM-32.
; A board esp32dev e adequada para o modulo/nucleo ESP32-WROOM-32.
;
; Ajustes comuns:
; - SSID/senha e broker MQTT padrao: include/app_config.h
; - Certificado CA MQTT TLS: include/certs.h
; - Porta serial de upload: upload_port
; - Velocidade do monitor: monitor_speed
; - Particoes: partitions.csv ja registrado em board_build.partitions

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 115200
upload_port = COM3



